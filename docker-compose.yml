version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: online_cinema_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cinema_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cinema_pass}
      POSTGRES_DB: ${POSTGRES_DB:-online_cinema}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cinema_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cinema_network
    restart: unless-stopped

  # Redis Cache & Celery Broker
  redis:
    image: redis:7-alpine
    container_name: online_cinema_redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cinema_network
    restart: unless-stopped

  # MinIO Object Storage (for file uploads)
  minio:
    image: minio/minio:latest
    container_name: online_cinema_minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - cinema_network
    restart: unless-stopped

  # FastAPI Application
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: online_cinema_api
    environment:
      # Database
      DATABASE_URL: postgresql://${POSTGRES_USER:-cinema_user}:${POSTGRES_PASSWORD:-cinema_pass}@postgres:5432/${POSTGRES_DB:-online_cinema}

      # JWT
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}

      # Email
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-your-email@gmail.com}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-your-password}
      FROM_EMAIL: ${FROM_EMAIL:-noreply@onlinecinema.com}
      FROM_NAME: ${FROM_NAME:-Online Cinema}

      # Frontend
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}

      # Redis
      REDIS_URL: redis://redis:6379/0

      # Stripe
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}

      # Token Expiration
      ACTIVATION_TOKEN_EXPIRE_HOURS: ${ACTIVATION_TOKEN_EXPIRE_HOURS:-24}
      PASSWORD_RESET_TOKEN_EXPIRE_HOURS: ${PASSWORD_RESET_TOKEN_EXPIRE_HOURS:-1}
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./app:/app/app
      - ./alembic:/app/alembic
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - cinema_network
    restart: unless-stopped

  # Celery Worker
  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile.celery
    container_name: online_cinema_celery_worker
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-cinema_user}:${POSTGRES_PASSWORD:-cinema_pass}@postgres:5432/${POSTGRES_DB:-online_cinema}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-your-email@gmail.com}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-your-password}
      FROM_EMAIL: ${FROM_EMAIL:-noreply@onlinecinema.com}
      FROM_NAME: ${FROM_NAME:-Online Cinema}
    volumes:
      - ./app:/app/app
    depends_on:
      - postgres
      - redis
    networks:
      - cinema_network
    restart: unless-stopped

  # Celery Beat (Scheduler)
  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile.celery-beat
    container_name: online_cinema_celery_beat
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-cinema_user}:${POSTGRES_PASSWORD:-cinema_pass}@postgres:5432/${POSTGRES_DB:-online_cinema}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
    volumes:
      - ./app:/app/app
    depends_on:
      - postgres
      - redis
      - celery_worker
    networks:
      - cinema_network
    restart: unless-stopped

  # Nginx Reverse Proxy (Optional - for production)
  nginx:
    image: nginx:alpine
    container_name: online_cinema_nginx
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
    networks:
      - cinema_network
    restart: unless-stopped
    profiles:
      - production

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local

networks:
  cinema_network:
    driver: bridge
